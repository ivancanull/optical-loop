{{include_text('defines.yaml')}}
mapper:
  diagnostics: True
architecture:   
  # ======================= Top level is !Hierarchical =======================
  nodes: &chip
  - !Container # Top-level system
    name: chip
    <<<: [*container_defaults]
    attributes: {has_power_gating: True}

  - !Component # DRAM main memory
    name: glb
    <<<: [*component_defaults]
    subclass: sram
    attributes: 
      width: 2048
      depth: 1024 * 256 * 8 // width # 256KB
    constraints: 
      dataspace: {keep_only: [Inputs, Outputs]}
      temporal:
        factors: !nomerge []
        no_iteration_over_dataspaces: !nomerge []
        permutation: [X, Y, N, M, C, Q, P]

  - !Container # Tile
    name: shared_router_group
    <<<: [*container_defaults, *spatial_map_all_weights]
    attributes: {has_power_gating: True}
    spatial: {meshX: 8}

  - !Component # Router: Sends data to other tiles
    name: router
    # No passthrough here because we assume multiple writes can be staged
    # before sending
    <<<: [*component_defaults, *keep_inputs, *keep_outputs, *no_temporal_reuse]
    subclass: isaac_router_shared_by_four
    attributes: {depth: INF, width: 128}

  - !Container # Macro
    name: tile # long name so it doesn't conflict with other names
    <<<: [*container_defaults, *spatial_map_all_weights]
    attributes: {has_power_gating: True}
    spatial: {meshX: N_TILES}

  - !Component # Input buffer
    name: input_buffer
    <<<: [*component_defaults]
    subclass: sram
    attributes:
      n_macros: N_PES
      width: N_PES * SUPPORTED_INPUT_BITS
      depth: ARRAY_PARALLEL_INPUTS * SUPPORTED_INPUT_BITS * N_PES // width
      multiple_buffering: 1 / CIM_UNIT_DEPTH_CELLS
    constraints: {dataspace: {keep_only: [Inputs]}, temporal: {factors_only: []}}
    enabled: True

  - !Component # Output buffer
    name: output_buffer
    <<<: [*component_defaults]
    subclass: sram
    attributes:
      n_macros: N_PES
      width: N_PES * SUPPORTED_OUTPUT_BITS
      depth: ARRAY_PARALLEL_OUTPUTS * SUPPORTED_OUTPUT_BITS * N_PES // width
      multiple_buffering: 1 / CIM_UNIT_DEPTH_CELLS
    constraints: {dataspace: {keep_only: [Outputs]}, temporal: {factors_only: []}}
    enabled: True

  - !Container # Macro
    name: photonic_pe # long name so it doesn't conflict with other names
    <<<: [*container_defaults]
    attributes: {has_power_gating: True}
    spatial: {meshX: N_PES}

  - !Component # Weight cache stores weights
    name: weight_cache
    <<<: [*component_defaults, *keep_weights]
    subclass: sram
    attributes:
      depth: N_ROWS * N_COLUMNS
      width: ENCODED_WEIGHT_BITS               # To ensure that we can run weight-stationary
    constraints: 
      temporal: 
        factors_only: [M=-1]
        factors: []
        no_iteration_over_dataspaces: !nomerge [] # Overwrite default

  - !Component # Weight cache stores weights
    name: input_cache
    <<<: [*component_defaults, *keep_inputs]
    subclass: sram
    attributes:
      depth: N_COLUMNS
      width: ENCODED_INPUT_BITS
    constraints: 
      temporal: 
        factors_only: [M=-1]
        factors: []
        no_iteration_over_dataspaces: !nomerge [] # Overwrite default

  - !Component # DAC supplies analog weight values
    name: input_dac
    <<<: [*component_defaults, *keep_inputs, *no_coalesce]
    subclass: dac
    attributes: {width: WEIGHT_BITS_PER_SLICE, n_instances: N_COLUMNS * 2}

  - !Component
    name: input_mrr
    <<<: [*component_defaults, *keep_inputs, *no_coalesce]
    subclass: mrr
    attributes: {width: DAC_RESOLUTION, n_instances: N_COLUMNS * 2}

  - !ArrayContainer # Each row works on a different column of the filter weights
    name: row
    <<<: [*container_defaults, *spatial_must_reuse_inputs]
    spatial: {meshY: N_ROWS}
    constraints: {spatial: {maximize_dims: [[Y], [M]]}}
    max_utilization: {spatial: {factors: [('M=' + str(row.get_fanout()))]}}

  - !Component # ADC
    name: adc
    <<<: [*component_defaults, *keep_outputs, *no_coalesce]
    subclass: adc
    attributes: {<<<: *cim_component_attributes}

  - !Component # TIA converts analog current to voltage for ADC
    name: TIA
    <<<: [*component_defaults, *keep_outputs, *no_coalesce]
    subclass: tia
    attributes:
      depth: ENCODED_OUTPUT_BITS
      width: N_COLUMNS
      n_instances: N_COLUMNS
  
  - !Component # Photodiode converts output light to analog current
    name: photodiode_output_readout
    <<<: [*component_defaults, *keep_outputs, *no_coalesce]
    subclass: photodiode
    attributes:
      depth: ENCODED_OUTPUT_BITS
      width: N_COLUMNS

  - !Component
    name: delay_line
    # Set our storage with default values, keep outputs, and disable all reuse.
    <<<: [*component_defaults, *keep_outputs, *temporal_reuse]
    # Dummy_storage components have zero area and energy. In this tutorial, we're not
    # worried about calculating the energy or area of this component.
    subclass: delay_line
    # We also set the depth to infinite. Generally, the depth would be limited by the
    # capacity of the component, but we're not concerned with that in this tutorial.
    # constraints: {temporal: {maximize_dims: [[X]], maximize_dims_capacity: ENCODED_INPUT_BITS}}
    constraints:
      temporal: {maximize_dims: [[X]], maximize_dims_capacity: ENCODED_OUTPUT_BITS}
    attributes: 
      width: ENCODED_OUTPUT_BITS
      depth: N_COLUMNS # Infinite storage
      # Need an amplifier for each column
      n_instances: N_COLUMNS

  - !ArrayContainer # Each column stores a different weight slice. Columns share inputs.
    name: column
    <<<: [*container_defaults, *spatial_must_reuse_outputs]
    spatial: {meshX: N_COLUMNS}
    constraints:
      spatial:
        maximize_dims: [[R, S], [C]]
        # no_iteration_over_dataspaces: [Weights]
    max_utilization: {spatial: {factors: [('R=' + str(column.get_fanout()))]}}

  - !Component # DAC supplies analog weight values
    name: weight_dac
    <<<: [*component_defaults, *keep_weights, *no_coalesce]
    subclass: dac
    attributes: {width: WEIGHT_BITS_PER_SLICE, n_instances: 1}

  - !Component # A MRR in each row/column crossing grabs one wavelength of input/weight multiplied light to send to an output
    name: mrr
    subclass: mrr
    <<<: [*component_defaults, *keep_weights, *no_temporal_reuse]
    attributes: {width: WEIGHT_BITS_PER_SLICE, n_instances: 1}

  - !Hierarchical           # Virtualize an XxYxZ-bit MAC as multiple MAC units.
    nodes: *virtualized_mac # Defined in include/defines.yaml.
