{{include_text('defines.yaml')}}
mapper:
  diagnostics: True
architecture:
  # Canonical DEAP-CNNs dataflow:
  # - N_COLUMNS = R*S wavelength columns in one convolution unit.
  # - Per-column shared input modulation: laser, DAC, and input MRR.
  # - Per-column, per-channel weight bank: N_COLUMNS * N_ROWS weight MRRs.
  # - N_ROWS = D channel lines / optical weight-bank lines.
  # - N_Conv = nconv parallel convolution units for output pixels.
  # - M/K filters stay temporal; output channels are not spatially mapped.
  nodes: &chip
  - !Container
    name: chip
    <<<: [*container_defaults]
    attributes: {has_power_gating: True}

  - !Component
    name: glb
    <<<: [*component_defaults]
    subclass: sram
    attributes:
      width: 2048
      depth: 1024 * 256 * 8 // width
    constraints:
      dataspace: {keep_only: [Inputs, Outputs]}
      temporal:
        # Filters/output channels are intentionally handled sequentially.
        factors: !nomerge [Q=0, M=-1, C=-1, X=1]
        permutation: [N, M, C, Q, P]
        no_iteration_over_dataspaces: !nomerge []

  - !Container
    name: tile
    <<<: [*container_defaults, *spatial_must_reuse_weights]
    attributes: {has_power_gating: True}
    spatial: {meshX: N_TILES}
    constraints:
      spatial:
        maximize_dims: [[P, Q], [N]]
        split: 999

  - !Component
    name: output_buffer
    <<<: [*component_defaults]
    subclass: sram
    attributes:
      n_macros: N_Conv
      width: N_Conv * SUPPORTED_OUTPUT_BITS
      depth: ARRAY_PARALLEL_OUTPUTS * SUPPORTED_OUTPUT_BITS * N_Conv // width
      multiple_buffering: 1 / CIM_UNIT_DEPTH_CELLS
    constraints: {dataspace: {keep_only: [Outputs]}, temporal: {factors_only: []}}
    enabled: True

  - !Container
    name: conv_unit
    <<<: [*container_defaults, *spatial_must_reuse_weights]
    attributes: {has_power_gating: True}
    spatial: {meshX: N_Conv}
    constraints:
      spatial:
        maximize_dims: [[P, Q], [N]]
        split: 999

  # D channel readout lines per conv_unit. Total TIA = N_Conv * N_ROWS.
  - !Component
    name: TIA
    <<<: [*component_defaults, *keep_outputs, *no_coalesce]
    subclass: tia
    attributes:
      depth: INF
      width: 1
      n_instances: N_ROWS

  # D photodiode readout lines per conv_unit. Total photodiodes = N_Conv * N_ROWS.
  - !Component
    name: photodiode_output_readout
    <<<: [*component_defaults, *keep_outputs, *no_coalesce]
    subclass: photodiode
    attributes:
      depth: INF
      width: 1
      n_instances: N_ROWS

  # One ADC per conv_unit. Total ADC = N_Conv.
  - !Component
    name: adc
    <<<: [*component_defaults, *keep_outputs, *no_coalesce]
    subclass: deap_adc
    attributes:
      <<<: *cim_component_attributes
      width: 1
      resolution: SUPPORTED_OUTPUT_BITS
      n_instances: 1

  # Input-side modulation shared by all channel rows.
  # Total laser/DAC/input_mrr = N_Conv * N_COLUMNS.
  - !Component
    name: laser
    <<<: [*component_defaults, *keep_inputs, *no_coalesce]
    subclass: laser
    attributes:
      depth: INF
      width: N_COLUMNS
      n_instances: N_COLUMNS

  - !Component
    name: dac
    <<<: [*component_defaults, *keep_inputs, *no_coalesce]
    subclass: dac_r2r_ladder_compound
    attributes:
      width: 1
      resolution: DAC_RESOLUTION
      unit_resistance: DAC_UNIT_RESISTANCE
      zero_between_values: 0
      bit_distribution: INPUT_BIT_DISTRIBUTION
      hist: hist_to_magnitude(INPUTS_HIST)
      voltage: VOLTAGE / 2
      n_instances: N_COLUMNS

  - !Component
    name: input_mrr
    <<<: [*component_defaults, *keep_inputs, *no_coalesce]
    subclass: tomrr
    attributes:
      depth: INF
      width: N_COLUMNS
      n_instances: N_COLUMNS

  # Channel rows reuse the input-side optical signal.
  # Total weight_mrr = N_Conv * N_COLUMNS * N_ROWS.
  - !ArrayContainer
    name: channel_weight_row
    <<<: [*container_defaults]
    spatial: {meshY: N_ROWS}
    constraints:
      spatial:
        # `spatial_must_reuse_inputs` cannot be used here because C is an
        # Inputs dimension. The hierarchy still shares the input-side MRRs
        # across rows by placing them above this spatial fanout.
        no_reuse: [Outputs, Weights]
        factors: [N=1, M=1, P=1, Q=1, R=1, S=1, X=1]
        maximize_dims: [[C]]
        split: 999

  # Wavelength columns map kernel positions at each channel row.
  - !ArrayContainer
    name: wavelength_column
    <<<: [*container_defaults, *spatial_must_reuse_outputs]
    spatial: {meshX: N_COLUMNS}
    constraints:
      spatial:
        maximize_dims: [[R, S]]
        split: 999

  - !Component
    name: weight_mrr
    subclass: tomrr
    <<<: [*component_defaults, *keep_inputs, *keep_weights, *no_temporal_reuse]
    attributes:
      width: 1
      n_instances: 1

  - !Hierarchical
    nodes: *virtualized_mac
