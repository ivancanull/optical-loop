name: DAC26 reproduction smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements-reproduction.txt') }}
      - name: Build pinned reproduction image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: opticalloop-dac26:local
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: Unit tests
        run: docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp/opticalloop-home -v "$PWD:/work/optical-loop" -w /work/optical-loop opticalloop-dac26:local python3 -m pytest -q
      - name: Native mapper smoke and notebook
        run: docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp/opticalloop-home -v "$PWD:/work/optical-loop" -w /work/optical-loop opticalloop-dac26:local python3 optical_loop.py reproduce smoke --workers 2
      - name: Rotate build cache
        run: rm -rf /tmp/.buildx-cache && mv /tmp/.buildx-cache-new /tmp/.buildx-cache
